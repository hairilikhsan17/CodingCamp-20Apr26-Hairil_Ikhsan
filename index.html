<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Productivity Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="light-mode">

    <!-- Theme Toggle -->
    <div class="fixed top-4 right-4 z-50">
        <button onclick="toggleDarkMode()" class="p-2 rounded-full bg-white/20 backdrop-blur-md border border-gray-300 shadow-md transition-all hover:scale-110">
            <span id="theme-icon">🌙</span>
        </button>
    </div>

    <div class="max-w-6xl mx-auto p-6 space-y-6">
        
        <!-- Header Section -->
        <div class="glass-card text-center py-10">
            <h1 id="digital-clock" class="text-6xl font-bold text-indigo-600 mb-2">00:00:00</h1>
            <p id="current-date" class="text-gray-500 text-lg mb-4">Loading date...</p>
            <h2 id="greeting" class="text-3xl font-semibold text-gray-800">
                Selamat Pagi, <span id="user-name" onclick="changeName()" class="cursor-pointer border-b-2 border-indigo-400">User</span>
            </h2>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <!-- Focus Timer -->
            <div class="glass-card flex flex-col items-center justify-center">
                <h3 class="text-xl font-bold mb-4">Focus Timer</h3>
                <div class="flex space-x-2 mb-4">
                    <button onclick="setTimerDuration(25)" class="text-xs bg-gray-200 px-3 py-1 rounded-full hover:bg-indigo-500 hover:text-white transition">25m</button>
                    <button onclick="setTimerDuration(45)" class="text-xs bg-gray-200 px-3 py-1 rounded-full hover:bg-indigo-500 hover:text-white transition">45m</button>
                    <button onclick="setTimerDuration(60)" class="text-xs bg-gray-200 px-3 py-1 rounded-full hover:bg-indigo-500 hover:text-white transition">60m</button>
                </div>
                <div id="timer-display" class="text-7xl font-bold text-indigo-500 mb-8">25:00</div>
                <div class="flex space-x-4">
                    <button id="btn-start" onclick="startTimer()" class="btn-timer px-8">Start</button>
                    <button id="btn-stop" onclick="stopTimer()" class="btn-timer px-8">Stop</button>
                    <button id="btn-reset" onclick="resetTimer()" class="btn-timer px-8">Reset</button>
                </div>
            </div>

            <!-- Tasks Section -->
            <div class="glass-card flex flex-col">
                <h3 class="text-xl font-bold mb-4">Tasks</h3>
                <div class="flex space-x-2 mb-2">
                    <input type="text" id="task-input" placeholder="Tambah tugas baru..." class="flex-1 border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-transparent">
                    <button onclick="addTask()" class="btn-primary">Add</button>
                </div>
                <p id="task-error" class="text-red-500 text-xs mb-2 hidden">Tugas sudah ada!</p>
                <ul id="task-list" class="space-y-3 max-h-60 overflow-y-auto pr-2"></ul>
            </div>

            <!-- Quick Links Section -->
            <div class="glass-card flex flex-col md:col-span-2 lg:col-span-1">
                <h3 class="text-xl font-bold mb-4">Quick Links</h3>
                <div class="flex flex-row space-x-2 mb-6">
                    <input type="text" id="link-name" placeholder="Nama" class="flex-1 border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-transparent">
                    <input type="text" id="link-url" placeholder="URL" class="flex-[2] border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-transparent">
                    <button onclick="addLink()" class="btn-primary text-sm px-4">Add</button>
                </div>
                <div id="links-container" class="flex flex-wrap gap-3"></div>
            </div>

        </div>
    </div>

    <!-- Edit Task Modal -->
    <div id="edit-overlay" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-[100] backdrop-blur-sm">
        <div class="glass-card w-full max-w-sm mx-4">
            <h3 class="text-lg font-bold mb-4">Edit Tugas</h3>
            <input type="text" id="edit-input" class="w-full border rounded-lg px-4 py-2 mb-4 bg-transparent focus:outline-none focus:ring-2 focus:ring-indigo-400">
            <div class="flex space-x-2 justify-end">
                <button onclick="closeEdit()" class="px-4 py-2 bg-gray-200 rounded-lg text-sm">Batal</button>
                <button onclick="saveEdit()" class="px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm">Simpan</button>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>

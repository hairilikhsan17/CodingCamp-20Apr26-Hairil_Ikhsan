<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do Life Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    /* ================================================
       TO-DO LIFE DASHBOARD — Embedded CSS
       Matches reference: white cards on purple/blue gradient
       ================================================ */

    :root {
      --blue:       #5b6ef5;
      --blue-hover: #4558e8;
      --blue-light: #eef0fd;
      --red:        #ef4444;
      --gray-light: #f3f4f6;
      --border:     #e5e7eb;
      --text:       #111827;
      --text2:      #6b7280;
      --text3:      #9ca3af;
      --card-bg:    #ffffff;
      --card-radius: 14px;
      --card-shadow: 0 2px 20px rgba(0,0,0,0.10);
    }

    [data-theme="dark"] {
      --card-bg:    #1e1e2e;
      --blue-light: #2a2d4e;
      --gray-light: #2a2a3a;
      --border:     #333350;
      --text:       #f0f0ff;
      --text2:      #a0a0c0;
      --text3:      #606080;
      --card-shadow: 0 2px 24px rgba(0,0,0,0.4);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      position: relative;
    }

    .bg-gradient {
      position: fixed; inset: 0;
      background: linear-gradient(135deg, #7c6ff7 0%, #5b6ef5 35%, #3b5bdb 65%, #6d3fc0 100%);
      z-index: 0; transition: background 0.4s;
    }
    [data-theme="dark"] .bg-gradient {
      background: linear-gradient(135deg, #1a0a3d 0%, #0f0c2a 40%, #0a1628 100%);
    }

    .page-wrap {
      position: relative; z-index: 1;
      max-width: 920px; margin: 0 auto;
      padding: 28px 18px 50px;
      display: flex; flex-direction: column; gap: 16px;
    }

    /* CARDS */
    .card {
      background: var(--card-bg);
      border-radius: var(--card-radius);
      box-shadow: var(--card-shadow);
      padding: 22px 24px;
      transition: background 0.3s;
    }
    .card-title { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 16px; }

    /* HEADER CARD */
    .header-card {
      background: var(--card-bg); border-radius: var(--card-radius);
      box-shadow: var(--card-shadow); padding: 24px 24px 20px;
      text-align: center; transition: background 0.3s;
    }
    .header-top-row { display: grid; grid-template-columns: 44px 1fr 44px; align-items: start; }
    .header-left  { justify-self: start; }
    .header-right { justify-self: end; }
    .header-center { display: flex; flex-direction: column; align-items: center; gap: 3px; }

    .clock { font-size: 52px; font-weight: 700; color: var(--blue); letter-spacing: 0.02em; line-height: 1; }
    .date  { font-size: 13px; color: var(--text2); margin-top: 2px; }
    .greeting { font-size: 22px; font-weight: 700; color: var(--text); margin-top: 8px; }

    .icon-btn {
      background: none; border: none; font-size: 18px; cursor: pointer;
      padding: 6px; border-radius: 8px; transition: background 0.15s;
    }
    .icon-btn:hover { background: var(--gray-light); }

    .name-edit { display: flex; gap: 8px; margin-top: 14px; justify-content: center; }
    .name-edit input { width: 200px; }
    .name-edit.hidden { display: none; }

    /* MID ROW */
    .mid-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    /* TIMER */
    .timer-card { display: flex; flex-direction: column; align-items: center; text-align: center; }
    .timer-card .card-title { align-self: flex-start; margin-bottom: 6px; }

    .timer-display {
      font-size: 60px; font-weight: 700; color: var(--blue);
      letter-spacing: 0.02em; line-height: 1; margin: 8px 0 14px;
    }

    .timer-duration-row {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 16px; font-size: 13px; color: var(--text2);
    }
    .timer-duration-row input { width: 58px; text-align: center; }
    .timer-btns { display: flex; gap: 8px; }

    /* TASKS */
    .tasks-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .tasks-header .card-title { margin-bottom: 0; }

    .task-add-row { display: flex; gap: 8px; margin-bottom: 8px; }
    .task-add-row input { flex: 1; }

    .task-stats { font-size: 12px; color: var(--text3); margin-bottom: 10px; }

    .task-list { list-style: none; display: flex; flex-direction: column; gap: 8px; max-height: 280px; overflow-y: auto; }
    .task-list::-webkit-scrollbar { width: 4px; }
    .task-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .task-item {
      display: flex; align-items: center; gap: 9px;
      padding: 8px 10px; border: 1.5px solid var(--border); border-radius: 8px;
      background: var(--card-bg); transition: border-color 0.2s;
      animation: fadeSlide 0.2s ease;
    }
    .task-item:hover { border-color: var(--blue); }
    .task-item.completed { opacity: 0.58; }

    .task-cb {
      appearance: none; -webkit-appearance: none;
      width: 18px; height: 18px; flex-shrink: 0;
      border: 2px solid #c4c9f8; border-radius: 4px; cursor: pointer;
      position: relative; transition: background 0.15s, border-color 0.15s;
    }
    .task-cb:checked { background: var(--blue); border-color: var(--blue); }
    .task-cb:checked::after {
      content: ''; position: absolute; left: 3px; top: 0px;
      width: 7px; height: 11px; border: 2px solid #fff;
      border-left: none; border-top: none; transform: rotate(45deg);
    }

    .task-text { flex: 1; font-size: 14px; color: var(--text); word-break: break-word; }
    .task-item.completed .task-text { text-decoration: line-through; color: var(--text3); }
    .task-actions { display: flex; gap: 5px; }

    .btn-edit {
      background: var(--blue-light); color: var(--blue); border: none;
      border-radius: 6px; padding: 4px 10px; font-size: 12px; font-weight: 600;
      cursor: pointer; font-family: 'Inter', sans-serif; transition: opacity 0.15s;
    }
    .btn-edit:hover { opacity: 0.75; }

    .btn-delete {
      background: var(--red); color: #fff; border: none;
      border-radius: 6px; padding: 4px 10px; font-size: 12px; font-weight: 600;
      cursor: pointer; font-family: 'Inter', sans-serif; transition: opacity 0.15s;
    }
    .btn-delete:hover { opacity: 0.82; }

    .empty-msg { text-align: center; color: var(--text3); font-size: 13px; padding: 18px 0; }

    /* QUICK LINKS */
    .link-add-row { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
    .link-add-row input { flex: 1; min-width: 90px; }
    .links-row { display: flex; flex-wrap: wrap; gap: 8px; min-height: 20px; }

    .link-chip {
      display: inline-flex; align-items: center; gap: 7px;
      background: var(--blue); color: #fff; border-radius: 8px;
      padding: 8px 13px; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: opacity 0.15s, transform 0.1s; text-decoration: none;
    }
    .link-chip:hover { opacity: 0.87; transform: translateY(-1px); }
    .link-chip a { color: #fff; text-decoration: none; }

    .link-x {
      background: rgba(255,255,255,0.22); border: none; color: #fff;
      width: 18px; height: 18px; border-radius: 50%; font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background 0.15s;
      font-family: 'Inter', sans-serif; line-height: 1; flex-shrink: 0;
    }
    .link-x:hover { background: rgba(255,255,255,0.4); }
    .no-links { font-size: 13px; color: var(--text3); }

    /* BUTTONS */
    .btn-blue {
      background: var(--blue); color: #fff; border: none; border-radius: 8px;
      padding: 8px 18px; font-size: 13px; font-weight: 600; cursor: pointer;
      font-family: 'Inter', sans-serif; transition: background 0.15s, transform 0.1s; white-space: nowrap;
    }
    .btn-blue:hover  { background: var(--blue-hover); }
    .btn-blue:active { transform: scale(0.97); }

    .btn-gray {
      background: #7b8ef7; color: #fff; border: none; border-radius: 8px;
      padding: 8px 18px; font-size: 13px; font-weight: 600; cursor: pointer;
      font-family: 'Inter', sans-serif; transition: background 0.15s;
    }
    .btn-gray:hover { background: var(--blue); }

    .btn-light {
      background: var(--gray-light); color: var(--text2); border: 1.5px solid var(--border);
      border-radius: 8px; padding: 8px 18px; font-size: 13px; font-weight: 500;
      cursor: pointer; font-family: 'Inter', sans-serif; transition: background 0.15s;
    }
    .btn-light:hover { background: var(--border); }

    /* INPUTS */
    input[type="text"], input[type="url"], input[type="number"] {
      font-family: 'Inter', sans-serif; font-size: 13px; color: var(--text);
      background: var(--card-bg); border: 1.5px solid var(--border);
      border-radius: 8px; padding: 8px 12px; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(91,110,245,0.14); }
    input::placeholder { color: var(--text3); }

    select {
      font-family: 'Inter', sans-serif; font-size: 12px; color: var(--text2);
      background: var(--gray-light); border: 1.5px solid var(--border);
      border-radius: 7px; padding: 5px 10px; outline: none; cursor: pointer;
    }

    /* MODAL */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.48);
      display: flex; align-items: center; justify-content: center;
      z-index: 200; animation: fadeIn 0.15s;
    }
    .modal-overlay.hidden { display: none; }

    .modal {
      background: var(--card-bg); border-radius: var(--card-radius);
      padding: 26px 28px; min-width: 300px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.22);
      animation: popIn 0.2s cubic-bezier(.22,1,.36,1);
    }
    .modal h3 { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 14px; }
    .modal input { width: 100%; }
    .modal-btns { display: flex; gap: 8px; margin-top: 14px; }

    /* ANIMATIONS */
    @keyframes fadeIn    { from { opacity: 0; } to { opacity: 1; } }
    @keyframes fadeSlide { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    @keyframes popIn     { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

    /* RESPONSIVE */
    @media (max-width: 640px) {
      .mid-row { grid-template-columns: 1fr; }
      .clock { font-size: 38px; }
      .timer-display { font-size: 46px; }
      .link-add-row { flex-direction: column; }
      .header-top-row { grid-template-columns: 40px 1fr 40px; }
    }
  </style>
</head>
<body>

  <div class="bg-gradient"></div>

  <div class="page-wrap">

    <!-- HEADER CARD -->
    <div class="header-card">
      <div class="header-top-row">
        <div class="header-left">
          <button class="icon-btn" id="editNameBtn" title="Edit name">✏️</button>
        </div>
        <div class="header-center">
          <div class="clock" id="clock">00:00:00</div>
          <div class="date"  id="currentDate">Loading...</div>
          <div class="greeting" id="greeting">Hello</div>
        </div>
        <div class="header-right">
          <button class="icon-btn" id="themeToggle" title="Toggle dark mode">🌙</button>
        </div>
      </div>

      <!-- Inline name edit -->
      <div class="name-edit hidden" id="nameEdit">
        <input type="text" id="nameInput" placeholder="Enter your name..." maxlength="30" />
        <button class="btn-blue" id="saveNameBtn">Save</button>
      </div>
    </div>

    <!-- MID ROW: Timer + Tasks -->
    <div class="mid-row">

      <!-- FOCUS TIMER -->
      <div class="card timer-card">
        <h2 class="card-title">Focus Timer</h2>
        <div class="timer-display" id="timerDisplay">25:00</div>
        <div class="timer-duration-row">
          <label for="timerDuration">Duration (min):</label>
          <input type="number" id="timerDuration" min="1" max="120" value="25" />
        </div>
        <div class="timer-btns">
          <button class="btn-blue"  id="startBtn">Start</button>
          <button class="btn-gray"  id="stopBtn">Stop</button>
          <button class="btn-light" id="resetBtn">Reset</button>
        </div>
      </div>

      <!-- TASKS -->
      <div class="card tasks-card">
        <div class="tasks-header">
          <h2 class="card-title">Tasks</h2>
          <select id="sortSelect">
            <option value="default">All</option>
            <option value="active">Active first</option>
            <option value="completed">Done first</option>
          </select>
        </div>
        <div class="task-add-row">
          <input type="text" id="taskInput" placeholder="Add a new task..." />
          <button class="btn-blue" id="addTaskBtn">Add</button>
        </div>
        <div class="task-stats">
          <span id="statPending">0 pending</span> · <span id="statDone">0 done</span>
        </div>
        <ul class="task-list" id="taskList"></ul>
      </div>

    </div>

    <!-- QUICK LINKS -->
    <div class="card">
      <h2 class="card-title">Quick Links</h2>
      <div class="link-add-row">
        <input type="text" id="linkName" placeholder="Link name" />
        <input type="url"  id="linkUrl"  placeholder="URL (e.g. https://google.com)" />
        <button class="btn-blue" id="addLinkBtn">Add Link</button>
      </div>
      <div class="links-row" id="linksGrid"></div>
    </div>

  </div>

  <!-- EDIT TASK MODAL -->
  <div class="modal-overlay hidden" id="editOverlay">
    <div class="modal">
      <h3>Edit Task</h3>
      <input type="text" id="editTaskInput" maxlength="100" />
      <div class="modal-btns">
        <button class="btn-blue"  id="saveEditBtn">Save</button>
        <button class="btn-light" id="cancelEditBtn">Cancel</button>
      </div>
    </div>
  </div>

  <script>
    "use strict";

    const $ = id => document.getElementById(id);

    // DOM
    const clockEl      = $("clock"), greetingEl = $("greeting"), dateEl = $("currentDate");
    const themeToggle  = $("themeToggle");
    const editNameBtn  = $("editNameBtn"), nameEdit = $("nameEdit");
    const nameInput    = $("nameInput"),   saveNameBtn = $("saveNameBtn");
    const timerDisplay = $("timerDisplay"), timerDuration = $("timerDuration");
    const startBtn     = $("startBtn"),    stopBtn = $("stopBtn"), resetBtn = $("resetBtn");
    const taskInput    = $("taskInput"),   addTaskBtn = $("addTaskBtn");
    const taskList     = $("taskList"),    sortSelect = $("sortSelect");
    const statPending  = $("statPending"), statDone = $("statDone");
    const editOverlay  = $("editOverlay"), editTaskInput = $("editTaskInput");
    const saveEditBtn  = $("saveEditBtn"), cancelEditBtn = $("cancelEditBtn");
    const linkName     = $("linkName"),    linkUrl = $("linkUrl"), addLinkBtn = $("addLinkBtn");
    const linksGrid    = $("linksGrid");

    // LocalStorage helpers
    const LS = {
      get: k      => JSON.parse(localStorage.getItem(k)),
      set: (k, v) => localStorage.setItem(k, JSON.stringify(v)),
    };

    /* ---- THEME ---- */
    function initTheme() {
      const t = LS.get("theme") || "light";
      document.documentElement.setAttribute("data-theme", t);
      themeToggle.textContent = t === "dark" ? "☀️" : "🌙";
    }
    themeToggle.addEventListener("click", () => {
      const cur  = document.documentElement.getAttribute("data-theme");
      const next = cur === "dark" ? "light" : "dark";
      document.documentElement.setAttribute("data-theme", next);
      themeToggle.textContent = next === "dark" ? "☀️" : "🌙";
      LS.set("theme", next);
    });

    /* ---- CLOCK ---- */
    const DAYS   = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
    const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
    const pad    = n => String(n).padStart(2, "0");

    function getGreeting(h) {
      if (h >= 5  && h <= 11) return "Good Morning ☀️";
      if (h >= 12 && h <= 17) return "Good Afternoon 🌤";
      if (h >= 18 && h <= 21) return "Good Evening 🌆";
      return "Good Night 🌙";
    }

    function updateClock() {
      const now = new Date();
      const h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
      clockEl.textContent    = `${pad(h)}:${pad(m)}:${pad(s)}`;
      greetingEl.textContent = getGreeting(h);
      dateEl.textContent     = `${DAYS[now.getDay()]}, ${MONTHS[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;
    }
    setInterval(updateClock, 1000);
    updateClock();

    /* ---- NAME ---- */
    editNameBtn.addEventListener("click", () => {
      nameEdit.classList.toggle("hidden");
      nameInput.value = LS.get("userName") || "";
      if (!nameEdit.classList.contains("hidden")) nameInput.focus();
    });
    saveNameBtn.addEventListener("click", saveName);
    nameInput.addEventListener("keydown", e => { if (e.key === "Enter") saveName(); });
    function saveName() {
      const val = nameInput.value.trim();
      if (!val) return;
      LS.set("userName", val);
      nameEdit.classList.add("hidden");
    }

    /* ---- TIMER ---- */
    let timerInterval = null, timerRunning = false;
    let totalSecs = 0, remainSecs = 0;

    function initTimer() {
      totalSecs = (parseInt(timerDuration.value) || 25) * 60;
      remainSecs = totalSecs;
      timerDisplay.textContent = formatTime(remainSecs);
    }
    function formatTime(s) { return `${pad(Math.floor(s/60))}:${pad(s%60)}`; }

    function tick() {
      if (remainSecs <= 0) {
        clearInterval(timerInterval); timerRunning = false;
        timerDisplay.textContent = "00:00";
        alert("⏱ Focus session done! Great work.");
        initTimer(); return;
      }
      remainSecs--;
      timerDisplay.textContent = formatTime(remainSecs);
    }

    startBtn.addEventListener("click", () => {
      if (timerRunning) return;
      timerRunning = true;
      timerInterval = setInterval(tick, 1000);
    });
    stopBtn.addEventListener("click", () => {
      if (!timerRunning) return;
      timerRunning = false; clearInterval(timerInterval);
    });
    resetBtn.addEventListener("click", () => {
      clearInterval(timerInterval); timerRunning = false; initTimer();
    });
    timerDuration.addEventListener("change", () => { if (!timerRunning) initTimer(); });
    initTimer();

    /* ---- TASKS ---- */
    let tasks     = LS.get("tasks") || [];
    let editingId = null;

    function escHtml(str) {
      return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;")
        .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }

    function renderTasks() {
      taskList.innerHTML = "";
      let list = [...tasks];
      if (sortSelect.value === "active")    list.sort((a,b) => Number(a.completed) - Number(b.completed));
      if (sortSelect.value === "completed") list.sort((a,b) => Number(b.completed) - Number(a.completed));

      if (list.length === 0) {
        taskList.innerHTML = `<li class="empty-msg">No tasks yet. Add one above! 📝</li>`;
      } else {
        list.forEach(t => {
          const li = document.createElement("li");
          li.className = `task-item${t.completed ? " completed" : ""}`;
          li.innerHTML = `
            <input type="checkbox" class="task-cb" ${t.completed ? "checked" : ""} data-id="${t.id}" />
            <span class="task-text">${escHtml(t.text)}</span>
            <div class="task-actions">
              <button class="btn-edit"   data-id="${t.id}">Edit</button>
              <button class="btn-delete" data-id="${t.id}">Delete</button>
            </div>`;
          taskList.appendChild(li);
        });
      }

      const done    = tasks.filter(t => t.completed).length;
      statPending.textContent = `${tasks.length - done} pending`;
      statDone.textContent    = `${done} done`;
    }

    function saveTasks() { LS.set("tasks", tasks); renderTasks(); }

    function addTask() {
      const text = taskInput.value.trim();
      if (!text) return;
      if (tasks.some(t => t.text.toLowerCase() === text.toLowerCase())) {
        taskInput.style.borderColor = "#ef4444";
        taskInput.placeholder = "⚠ Already exists!";
        setTimeout(() => { taskInput.style.borderColor = ""; taskInput.placeholder = "Add a new task..."; }, 1800);
        return;
      }
      tasks.push({ id: Date.now(), text, completed: false });
      taskInput.value = "";
      saveTasks();
    }

    addTaskBtn.addEventListener("click", addTask);
    taskInput.addEventListener("keydown",  e => { if (e.key === "Enter") addTask(); });
    sortSelect.addEventListener("change",  renderTasks);

    taskList.addEventListener("change", e => {
      if (!e.target.classList.contains("task-cb")) return;
      const task = tasks.find(t => t.id === Number(e.target.dataset.id));
      if (task) { task.completed = e.target.checked; saveTasks(); }
    });

    taskList.addEventListener("click", e => {
      const id = Number(e.target.dataset.id);
      if (e.target.classList.contains("btn-edit")) {
        const task = tasks.find(t => t.id === id);
        if (!task) return;
        editingId = id;
        editTaskInput.value = task.text;
        editOverlay.classList.remove("hidden");
        editTaskInput.focus();
      }
      if (e.target.classList.contains("btn-delete")) {
        tasks = tasks.filter(t => t.id !== id);
        saveTasks();
      }
    });

    saveEditBtn.addEventListener("click", saveEdit);
    editTaskInput.addEventListener("keydown", e => { if (e.key === "Enter") saveEdit(); });
    function saveEdit() {
      const text = editTaskInput.value.trim();
      if (!text || editingId === null) return;
      if (tasks.some(t => t.id !== editingId && t.text.toLowerCase() === text.toLowerCase())) {
        editTaskInput.style.borderColor = "#ef4444"; return;
      }
      const task = tasks.find(t => t.id === editingId);
      if (task) task.text = text;
      editingId = null;
      editOverlay.classList.add("hidden");
      saveTasks();
    }

    cancelEditBtn.addEventListener("click", () => { editingId = null; editOverlay.classList.add("hidden"); });
    editOverlay.addEventListener("click",   e => { if (e.target === editOverlay) { editingId = null; editOverlay.classList.add("hidden"); } });

    /* ---- QUICK LINKS ---- */
    let links = LS.get("links") || [];

    function renderLinks() {
      linksGrid.innerHTML = "";
      if (links.length === 0) {
        linksGrid.innerHTML = `<span class="no-links">No links saved yet.</span>`; return;
      }
      links.forEach(link => {
        const chip = document.createElement("span");
        chip.className = "link-chip";
        const a = document.createElement("a");
        a.href = link.url; a.target = "_blank"; a.rel = "noopener noreferrer";
        a.textContent = escHtml(link.name);
        const x = document.createElement("button");
        x.className = "link-x"; x.textContent = "×"; x.title = "Remove";
        x.addEventListener("click", e => {
          e.preventDefault();
          links = links.filter(l => l.id !== link.id);
          saveLinks();
        });
        chip.appendChild(a); chip.appendChild(x); linksGrid.appendChild(chip);
      });
    }

    function saveLinks() { LS.set("links", links); renderLinks(); }

    function addLink() {
      const name = linkName.value.trim();
      let   url  = linkUrl.value.trim();
      if (!name || !url) return;
      if (!/^https?:\/\//i.test(url)) url = "https://" + url;
      try { new URL(url); } catch {
        linkUrl.style.borderColor = "#ef4444";
        setTimeout(() => { linkUrl.style.borderColor = ""; }, 1600); return;
      }
      links.push({ id: Date.now(), name, url });
      linkName.value = ""; linkUrl.value = "";
      saveLinks();
    }

    addLinkBtn.addEventListener("click", addLink);
    linkUrl.addEventListener("keydown",  e => { if (e.key === "Enter") addLink(); });
    linkName.addEventListener("keydown", e => { if (e.key === "Enter") addLink(); });

    /* ---- INIT ---- */
    initTheme();
    renderTasks();
    renderLinks();
  </script>
</body>
</html>
